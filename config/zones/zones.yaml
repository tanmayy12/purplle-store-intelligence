# =============================================================================
# Purplle Store Intelligence — Zone Configuration
# Store : ST1008 — Brigade_Bangalore
# Source: Store Layout Excel.xlsx (F.O.H floor plan, revised layout)
# =============================================================================
#
# Coordinate system
#   - Normalized frame coordinates in range [0.0, 1.0]
#   - Origin: top-left of camera frame (overhead / angled FOH view)
#   - x increases left → right, y increases top → bottom
#   - Polygons use clockwise vertex order, closed implicitly
#
# Calibrated against floor-plan dimensions (mm):
#   Store width  ≈ 7500 mm
#   Store height ≈ 4020 mm
#   Entry wall   : left (Existing Glass + inward-swing door)
#   Cash counter : right wall (710 mm from top shelf, 1210 mm from bottom shelf)
#   Fragrance island : 2594 mm from left wall, 500×900 mm, vertically centred
#   Makeup units     : 1347 mm east of fragrance island, ~900 mm wide
#   Queue gap        : 2000 mm between makeup units and cash counter
#
# NOTE: After `docker compose up`, fine-tune polygons by overlaying this config
#       on the bundled CCTV frame using the calibration script (see docs/ZONES.md).
# =============================================================================

version: "1.0"
schema: store-zones-v1

store:
  store_id: ST1008
  store_name: Brigade_Bangalore
  city: Bangalore
  layout_label: FOH_REVISED
  operating_date: "2026-04-10"

coordinate_system:
  type: normalized
  origin: top_left
  units: fraction_of_frame
  layout_reference_mm:
    width: 7500
    height: 4020

# ---------------------------------------------------------------------------
# Entry / Exit lines — used for footfall counting (line-crossing algorithm)
# ---------------------------------------------------------------------------
lines:
  entry_lines:
    - line_id: main_entrance_in
      name: Main Entrance (Inbound)
      zone_id: ENTRY_GATE
      # Vertical line at the interior edge of the glass door
      start: { x: 0.070, y: 0.340 }
      end:   { x: 0.070, y: 0.660 }
      direction: inbound          # positive cross = entering store
      inward_normal: [1, 0]
      debounce_frames: 5
      min_cross_velocity: 0.001
      count_footfall: true

  exit_lines:
    - line_id: main_entrance_out
      name: Main Entrance (Outbound)
      zone_id: EXIT_GATE
      start: { x: 0.070, y: 0.340 }
      end:   { x: 0.070, y: 0.660 }
      direction: outbound         # positive cross = leaving store
      outward_normal: [-1, 0]
      debounce_frames: 5
      count_exit: true

# ---------------------------------------------------------------------------
# Global analytics thresholds
# ---------------------------------------------------------------------------
analytics:
  session:
    reentry_cooldown_sec: 120
    bounce_threshold_sec: 30
    inactivity_timeout_sec: 1800

  dwell:
    engaged_min_sec: 60           # funnel "engaged" stage
    checkout_min_sec: 15          # funnel "checkout_proximity" stage
    heatmap_bucket_sec: 30

  queue:
    checkout_queue_zone_id: QUEUE_CHECKOUT
    min_queue_dwell_sec: 20
    queue_length_alert: 4         # persons in queue zone
    max_wait_time_alert_sec: 300

  crowd:
    crowd_zones:
      - FOH_MAIN
      - QUEUE_CHECKOUT
      - TOP_AISLE
      - BOTTOM_AISLE
    density_alert_persons: 12       # total in FOH_MAIN
    queue_crowd_alert_persons: 6  # total in QUEUE_CHECKOUT

  conversion:
    checkout_zone_id: CHECKOUT
    pos_match_window_before_sec: 600
    pos_match_window_after_sec: 120

# ---------------------------------------------------------------------------
# Zone definitions
# ---------------------------------------------------------------------------
